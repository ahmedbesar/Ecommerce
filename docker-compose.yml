services:
    catalog.api:
     image: ${DOCKER_REGISTRY-}catalogapi
     build:
      context: .
      dockerfile: services/catalog/Catalog.API/Dockerfile
     ports:
      - "8000:8000" 
     depends_on:
      - catalogdb
     extra_hosts:
      - "host.docker.internal:host-gateway"
     environment:
      - ASPNETCORE_URLS=http://+:8000
      - DatabaseSettings__ConnectionString=mongodb://catalogdb:27017
      - DatabaseSettings__DatabaseName=CatalogDb
      - DatabaseSettings__CollectionName=Products
      - DatabaseSettings__BrandsCollection=ProductBrands
      - DatabaseSettings__TypesCollection=ProductTypes

    catalogdb:
     image: mongo
     container_name: catalogdb
     ports:
      - "27017:27017"
     volumes:
      - catalogdata:/data/db
  
    basket.api:
     image: ${DOCKER_REGISTRY-}basketapi
     build:
      context: .
      dockerfile: services/Basket/Basket.Api/Dockerfile
     ports:
      - "8001:8001"
     depends_on:
      - redis
     extra_hosts:
      - "host.docker.internal:host-gateway"
     environment:
      - ASPNETCORE_URLS=http://+:8001
      - CacheSettings__ConnectionString=redis:6379

    redis:
     image: redis
     container_name: redis
     ports:
      - "6379:6379"

    portainer:
     image: portainer/portainer-ce:latest
     container_name: portainer
     restart: always
     ports:
      - "9000:9000"
     volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

    discountdb:
     image: postgres
     container_name: discountdb
     environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=DiscountDb
     restart: always
     ports:
      - "5432:5432"
     volumes:
      - discountdata:/var/lib/postgresql/data
     healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d DiscountDb"]
      interval: 10s
      timeout: 5s
      retries: 5

    pgadmin:
     image: dpage/pgadmin4
     container_name: pgadmin
     environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
     ports:
      - "5050:80"
     volumes:
      - pgadmin_data:/var/lib/pgadmin

    discount.api:
     image: ${DOCKER_REGISTRY-}discountapi
     build:
      context: .
      dockerfile: services/Discount/Discount.Api/Dockerfile
     ports:
      - "8002:8080"
     depends_on:
       discountdb:
         condition: service_healthy
     environment:
      - DatabaseSettings__ConnectionString=Server=discountdb;Port=5432;Database=DiscountDb;User Id=postgres;Password=postgres;

volumes:
 catalogdata:
 portainer_data:
 discountdata:
 pgadmin_data: