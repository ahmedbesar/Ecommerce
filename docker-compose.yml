services:
    catalog.api:
     image: ${DOCKER_REGISTRY-}catalogapi
     build:
      context: .
      dockerfile: services/catalog/Catalog.API/Dockerfile
     ports:
      - "8000:8000" 
     depends_on:
      - catalogdb
     extra_hosts:
      - "host.docker.internal:host-gateway"
     environment:
      - ASPNETCORE_URLS=http://+:8000
      - DatabaseSettings__ConnectionString=mongodb://catalogdb:27017
      - DatabaseSettings__DatabaseName=CatalogDb
      - DatabaseSettings__CollectionName=Products
      - DatabaseSettings__BrandsCollection=ProductBrands
      - DatabaseSettings__TypesCollection=ProductTypes
      - ElasticConfiguration__Uri=http://elasticsearch:9200

    catalogdb:
     image: mongo
     container_name: catalogdb
     ports:
      - "27017:27017"
     volumes:
      - catalogdata:/data/db
  
    basket.api:
     image: ${DOCKER_REGISTRY-}basketapi
     build:
      context: .
      dockerfile: services/Basket/Basket.Api/Dockerfile
     ports:
      - "8001:8001"
     depends_on:
      - redis
      - rabbitmq
     extra_hosts:
      - "host.docker.internal:host-gateway"
     environment:
      - ASPNETCORE_URLS=http://+:8001
      - CacheSettings__ConnectionString=redis:6379
      - GrpcSettings__DiscountUrl=http://discount.api:5002
      - "EventBusSettings__HostAddress=amqp://guest:guest@rabbitmq:5672"
      - ElasticConfiguration__Uri=http://elasticsearch:9200

    redis:
     image: redis
     container_name: redis
     ports:
      - "6379:6379"

    portainer:
     image: portainer/portainer-ce:latest
     container_name: portainer
     restart: always
     ports:
      - "9000:9000"
     volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

    discountdb:
     image: postgres
     container_name: discountdb
     environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=DiscountDb
     restart: always
     ports:
      - "5432:5432"
     volumes:
      - discountdata:/var/lib/postgresql
     healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d DiscountDb"]
      interval: 10s
      timeout: 5s
      retries: 5

    pgadmin:
     image: dpage/pgadmin4
     container_name: pgadmin
     environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
     ports:
      - "5050:80"
     volumes:
      - pgadmin_data:/var/lib/pgadmin

    discount.api:
     image: ${DOCKER_REGISTRY-}discountapi
     build:
      context: .
      dockerfile: services/Discount/Discount.Api/Dockerfile
     ports:
      - "8002:8002"
      - "5002:5002"
     depends_on:
       discountdb:
         condition: service_healthy
     environment:
      - DatabaseSettings__ConnectionString=Server=discountdb;Port=5432;Database=DiscountDb;User Id=postgres;Password=postgres;
      - ElasticConfiguration__Uri=http://elasticsearch:9200

    ordering.api:
     image: ${DOCKER_REGISTRY-}orderingapi
     build:
      context: .
      dockerfile: services/Ordering/Ordering.Api/Dockerfile
     ports:
      - "8003:8003"
     depends_on:
       orderdb:
         condition: service_healthy
       rabbitmq:
         condition: service_started
     extra_hosts:
      - "host.docker.internal:host-gateway"
     environment:
      - ASPNETCORE_URLS=http://+:8003
      - ConnectionStrings__OrderingConnectionString=Server=orderdb;Database=orderDB;User Id=sa;Password=Order@Pass123;TrustServerCertificate=True;
      - "EventBusSettings__HostAddress=amqp://guest:guest@rabbitmq:5672"
      - ElasticConfiguration__Uri=http://elasticsearch:9200

    orderdb:
     image: mcr.microsoft.com/mssql/server:2022-latest
     container_name: orderdb
     environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Order@Pass123
     restart: always
     ports:
      - "1433:1433"
     volumes:
      - orderdata:/var/opt/mssql
     healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Order@Pass123 -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

    rabbitmq:
     image: rabbitmq:3-management-alpine
     container_name: rabbitmq
     ports:
      - "5672:5672"
      - "15672:15672"
     volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    elasticsearch:
     image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
     container_name: elasticsearch
     environment:
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - discovery.type=single-node
      - xpack.security.enabled=false
     ports:
      - "9200:9200"
     volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

    kibana:
     image: docker.elastic.co/kibana/kibana:8.14.3
     container_name: kibana
     environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
     depends_on:
      - elasticsearch
     ports:
      - "5601:5601"

volumes:
 catalogdata:
 portainer_data:
 discountdata:
 pgadmin_data:
 orderdata:
 rabbitmq_data:
 elasticsearch-data: