<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
  <div class="container">

    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/home" id="navbar-brand">
      <i class="fa-solid fa-store text-primary"></i>
      <span class="fw-bold fs-5">E-Shop</span>
    </a>

    <!-- Mobile toggle -->
    <button
      class="navbar-toggler border-0"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarMain"
      aria-controls="navbarMain"
      aria-expanded="false"
      aria-label="Toggle navigation"
      id="navbar-toggler">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Links -->
    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/home"
            routerLinkActive="active"
            id="nav-home">
            <i class="fa-solid fa-house me-1"></i> Home
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/products"
            routerLinkActive="active"
            id="nav-products">
            <i class="fa-solid fa-boxes-stacked me-1"></i> Products
          </a>
        </li>
      </ul>

      <!-- Actions section -->
      <div class="d-flex align-items-center gap-4">
        
        <!-- Cart Icon -->
        <a routerLink="/basket" class="position-relative text-dark text-decoration-none d-flex align-items-center" style="cursor: pointer;" id="nav-basket">
          <i class="fa-solid fa-cart-shopping fs-5"></i>
          @if (getBasketCount() > 0) {
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-light" style="font-size: 0.65rem;">
              {{ getBasketCount() }}
              <span class="visually-hidden">items in cart</span>
            </span>
          }
        </a>

        <!-- Auth section -->
        <div class="d-flex align-items-center gap-2">
          @if (authService.isLoggedIn()) {
            <span class="text-muted small me-2">
              <i class="fa-solid fa-circle-user me-1 text-primary"></i>
              {{ username }}
            </span>
            <button
              class="btn btn-outline-danger btn-sm"
              (click)="logout()"
              id="btn-logout">
              <i class="fa-solid fa-right-from-bracket me-1"></i> Logout
            </button>
          } @else {
            <a
              class="btn btn-primary btn-sm"
              routerLink="/login"
              id="btn-login">
              <i class="fa-solid fa-right-to-bracket me-1"></i> Login
            </a>
          }
        </div>
      </div>
    </div>

  </div>
</nav>
