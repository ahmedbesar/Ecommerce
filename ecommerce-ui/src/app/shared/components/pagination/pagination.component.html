@if (totalPages() > 1) {
<div class="d-flex justify-content-center mt-5">
  <nav aria-label="Page navigation">
    <ul class="pagination">
      <li class="page-item" [class.disabled]="pageIndex() === 1">
        <a class="page-link" href="javascript:void(0)" (click)="onPageChange(pageIndex() - 1)">Previous</a>
      </li>

      @for (page of pages(); track $index) {
      <li class="page-item" [class.active]="pageIndex() === page" [class.disabled]="page === '...'">
        <a class="page-link" href="javascript:void(0)" (click)="onPageChange(page)">{{ page }}</a>
      </li>
      }

      <li class="page-item" [class.disabled]="pageIndex() === totalPages()">
        <a class="page-link" href="javascript:void(0)" (click)="onPageChange(pageIndex() + 1)">Next</a>
      </li>
    </ul>
  </nav>
</div>
}
