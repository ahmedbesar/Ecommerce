<div class="login-page d-flex align-items-center justify-content-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">

        <!-- Card -->
        <div class="login-card card border-0 shadow-sm p-4 p-md-5">

          <!-- Logo -->
          <div class="text-center mb-4">
            <div class="login-logo mx-auto mb-3">
              <i class="fa-solid fa-store text-primary"></i>
            </div>
            <h1 class="login-title h4 fw-bold text-dark mb-1">Welcome Back</h1>
            <p class="text-muted small mb-0">Sign in to your E-Shop account</p>
          </div>

          <!-- Error Alert -->
          @if (error()) {
            <div class="alert alert-danger d-flex align-items-center gap-2 mb-3 py-2 small" id="login-error">
              <i class="fa-solid fa-circle-exclamation flex-shrink-0"></i>
              <span>{{ error() }}</span>
            </div>
          }

          <!-- Form -->
          <form (ngSubmit)="onSubmit()" #loginForm="ngForm" id="login-form" novalidate>

            <!-- Username -->
            <div class="mb-3">
              <label for="login-username" class="form-label small fw-semibold text-dark">Username</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="fa-solid fa-user text-muted"></i>
                </span>
                <input
                  type="text"
                  class="form-control border-start-0 bg-light"
                  id="login-username"
                  name="username"
                  placeholder="Enter your username"
                  [(ngModel)]="username"
                  [disabled]="loading()"
                  required
                  autocomplete="username"
                />
              </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
              <label for="login-password" class="form-label small fw-semibold text-dark">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="fa-solid fa-lock text-muted"></i>
                </span>
                <input
                  [type]="showPassword() ? 'text' : 'password'"
                  class="form-control border-start-0 border-end-0 bg-light"
                  id="login-password"
                  name="password"
                  placeholder="Enter your password"
                  [(ngModel)]="password"
                  [disabled]="loading()"
                  required
                  autocomplete="current-password"
                />
                <button
                  type="button"
                  class="input-group-text bg-light border-start-0 cursor-pointer"
                  (click)="togglePassword()"
                  id="btn-toggle-password"
                  [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
                  <i [class]="showPassword() ? 'fa-solid fa-eye-slash text-muted' : 'fa-solid fa-eye text-muted'"></i>
                </button>
              </div>
            </div>

            <!-- Submit -->
            <button
              type="submit"
              class="btn btn-primary w-100 py-2 fw-semibold"
              [disabled]="loading()"
              id="btn-login-submit">
              @if (loading()) {
                <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                Signing in...
              } @else {
                <i class="fa-solid fa-right-to-bracket me-2"></i> Sign In
              }
            </button>

          </form>

          <!-- Hint -->
          <div class="text-center mt-4 pt-3 border-top">
            <p class="text-muted small mb-0">
              <i class="fa-solid fa-circle-info me-1"></i>
              Test users: <code>bob / User123!</code> or <code>admin / Admin123!</code>
            </p>
          </div>

        </div>

      </div>
    </div>
  </div>
</div>
